pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,ts,tsx,json,css}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: types
      run: pnpm check-types

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
