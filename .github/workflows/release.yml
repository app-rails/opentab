name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Set build metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
          cd apps/extension && npm pkg set version="$VERSION"

      - name: Build
        run: pnpm build
        env:
          BUILD_VERSION: ${{ env.VERSION }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ env.BUILD_TIME }}

      - name: Package extension
        run: |
          cd apps/extension/.output
          zip -r "${GITHUB_WORKSPACE}/opentab-chrome-extension-v${VERSION}.zip" chrome-mv3/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: opentab-chrome-extension-v${{ env.VERSION }}.zip
