name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find previous release tag
        id: prev_tag
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          # Walk the version-sorted (descending) tag list, locate the
          # current tag, and emit the line that follows it — i.e. the
          # version immediately preceding the one being released. This is
          # robust to retroactive re-runs where newer tags already exist.
          PREVIOUS_TAG=$(git tag --list 'v*' --sort=-v:refname \
            | awk -v cur="$CURRENT_TAG" 'found { print; exit } $0 == cur { found = 1 }')
          echo "Previous tag: ${PREVIOUS_TAG:-<none>}"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Set build metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
          cd apps/extension && npm pkg set version="$VERSION"

      - name: Build
        run: pnpm build
        env:
          BUILD_VERSION: ${{ env.VERSION }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ env.BUILD_TIME }}

      - name: Package extension
        run: |
          cd apps/extension/.output
          zip -r "${GITHUB_WORKSPACE}/opentab-chrome-extension-v${VERSION}.zip" chrome-mv3/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          previous_tag: ${{ steps.prev_tag.outputs.previous_tag }}
          files: opentab-chrome-extension-v${{ env.VERSION }}.zip
